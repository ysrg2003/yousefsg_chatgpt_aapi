<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatgpt Pro | Clean Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f4f7fb; --card: #ffffff; --text: #2d3436; --primary: #0984e3;
            --secondary: #dfe6e9; --user-bubble: #00b894; --bot-bubble: #ffffff;
            --border: #dcdde1; --accent: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #38bdf8;
            --secondary: #334155; --user-bubble: #0f766e; --bot-bubble: #1e293b;
            --border: #334155; --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; overflow: hidden;
        }

        /* Header */
        header {
            flex-shrink: 0; padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card); border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow); z-index: 10;
        }
        .logo-text { font-size: 1.1rem; font-weight: 700; color: var(--primary); }

        .nav-tools { display: flex; gap: 8px; }
        .tool-btn {
            background: var(--secondary); border: none; color: var(--text);
            width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* Settings */
        #settings-panel {
            background: var(--card); padding: 15px; border-bottom: 1px solid var(--border);
            display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        .input-field input { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid var(--border); background: var(--bg); color: var(--text); 
        }

        /* Chat Viewport */
        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 20px 10%; 
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg-container { display: flex; flex-direction: column; max-width: 90%; animation: slideIn 0.3s ease; }
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; width: 100%; align-items: flex-end; }

        .bubble {
            padding: 15px 20px; border-radius: 18px; font-size: 15px; line-height: 1.7;
            box-shadow: var(--shadow); word-wrap: break-word;
        }

        .user-align .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .bot-align .bubble { 
            background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px;
            width: fit-content; max-width: 98%;
        }

        /* --- تحسين الجداول --- */
        .bubble table { 
            border-collapse: collapse; margin: 15px 0; border: 1px solid var(--border);
            width: 100%; max-width: 100%; overflow-x: auto; display: block;
            border-radius: 8px;
        }
        .bubble th { background: var(--secondary); padding: 10px; border: 1px solid var(--border); font-weight: 600; }
        .bubble td { padding: 8px; border: 1px solid var(--border); text-align: center; }
        .bubble tr:nth-child(even) { background: rgba(0,0,0,0.02); }

        /* --- تحسين صناديق الأكواد --- */
        .code-wrapper {
            margin: 15px 0; border-radius: 10px; overflow: hidden;
            background: #1e1e1e; direction: ltr; text-align: left;
            border: 1px solid #333;
        }
        .code-header {
            background: #2d2d2d; color: #aaa; padding: 6px 15px; font-size: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #111; font-family: monospace;
        }
        .bubble pre { 
            margin: 0; padding: 15px; overflow-x: auto; color: #d4d4d4; 
            font-family: 'Consolas', 'Monaco', monospace; line-height: 1.5; font-size: 14px;
        }

        /* إخفاء أي عناصر غير مرغوب فيها قادمة من ChatGPT */
        .bubble button, .bubble .sr-only, .bubble .copy-button { display: none !important; }

        /* Footer */
        .footer-area { padding: 15px; background: var(--card); border-top: 1px solid var(--border); text-align: center; }
        .input-container {
            width: 100%; max-width: 800px; background: var(--bg);
            border: 2px solid var(--border); border-radius: 25px;
            display: flex; align-items: center; padding: 4px 12px; margin: 0 auto;
        }
        textarea { 
            flex: 1; background: transparent; border: none; color: var(--text); 
            padding: 10px; font-size: 15px; outline: none; resize: none; max-height: 120px;
        }
        .send-btn { 
            background: var(--primary); color: white; border: none; 
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #status-bar { font-size: 12px; margin-bottom: 8px; color: var(--primary); display: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { #chat-viewport { padding: 15px 5%; } }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo-area">
        <span style="font-size: 20px;">🤖</span>
        <div class="logo-text">ChatGPT Pro <small style="font-weight: 300; font-size: 9px;">Clean</small></div>
    </div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="clearChat()">🗑️</button>
        <button class="tool-btn" onclick="toggleSettings()">⚙️</button>
        <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div id="settings-panel">
    <div class="input-field"><input type="password" id="ghToken" placeholder="GitHub Token"></div>
    <div class="input-field"><input type="text" id="ghRepo" placeholder="username/repo"></div>
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">أهلاً بك! تم تحسين نظام عرض الجداول والأكواد. كيف يمكنني مساعدتك؟</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar" class="pulse">⏳ جاري المعالجة...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اسأل أي شيء..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
        applyTheme(localStorage.getItem('cfg_theme') || 'light');
    };

    function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        localStorage.setItem('cfg_theme', theme);
    }

    function toggleTheme() { applyTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    function toggleSettings() { const p = document.getElementById('settings-panel'); p.style.display = p.style.display === 'grid' ? 'none' : 'grid'; }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function clearChat() { if(confirm("مسح المحادثة؟")) document.getElementById('chat-viewport').innerHTML = ''; }

    function createMessage(content, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (side === 'bot') {
            bubble.innerHTML = content;
            formatBotResponse(bubble);
        } else {
            bubble.innerText = content;
        }
        
        container.appendChild(bubble);
        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    // وظيفة التنظيف والتنسيق الذكية
    function formatBotResponse(container) {
        // 1. حذف أي أزرار أو عناصر واجهة مستخدم تسللت من Scraping
        container.querySelectorAll('button, .sr-only, [role="button"]').forEach(el => el.remove());

        // 2. معالجة صناديق الأكواد
        container.querySelectorAll('pre').forEach(pre => {
            // تنظيف النص: حذف أول سطر (الذي يحتوي عادة على اسم اللغة أو "Copy code")
            let lines = pre.innerText.split('\n');
            if (lines.length > 1) {
                lines.shift(); // حذف السطر الأول دائماً كما طلبت
            }
            const cleanedCode = lines.join('\n').trim();

            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            
            // إنشاء هيدر جديد نظيف
            const header = document.createElement('div');
            header.className = 'code-header';
            header.innerHTML = `<span>Code Output</span><span style="cursor:pointer; color:var(--primary)" onclick="copyRaw(this)">Copy</span>`;
            
            const newPre = document.createElement('pre');
            newPre.innerText = cleanedCode;

            wrapper.appendChild(header);
            wrapper.appendChild(newPre);
            
            pre.parentNode.replaceChild(wrapper, pre);
        });

        // 3. تحسين الجداول برمجياً لضمان التنسيق
        container.querySelectorAll('table').forEach(table => {
            if(!table.parentNode.classList.contains('table-responsive')) {
                const responsiveDiv = document.createElement('div');
                responsiveDiv.style.overflowX = "auto";
                table.parentNode.insertBefore(responsiveDiv, table);
                responsiveDiv.appendChild(table);
            }
        });
    }

    async function copyRaw(btn) {
        const code = btn.closest('.code-wrapper').querySelector('pre').innerText;
        await navigator.clipboard.writeText(code);
        btn.innerText = "✅ Done";
        setTimeout(() => btn.innerText = "Copy", 2000);
    }

    async function startProcess() {
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();

        if(!token || !repo || !prompt) return alert("اكمل البيانات أولاً");

        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const startTime = new Date().toISOString();
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/chatgpt_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });
            if(!res.ok) throw new Error("فشل في الاتصال بـ GitHub");
            pollStatus(repo, token, startTime);
        } catch (e) {
            createMessage("❌ خطأ: " + e.message, 'bot');
            resetUI();
        }
    }

    async function pollStatus(repo, token, startTime) {
        let attempts = 0;
        const interval = setInterval(async () => {
            attempts++;
            if(attempts > 40) { clearInterval(interval); resetUI(); return; }
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?created=>${startTime}&per_page=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const run = data.workflow_runs[0];
                if(run && run.status === "completed") {
                    clearInterval(interval);
                    fetchResult(repo, run.id, token);
                }
            } catch (e) {}
        }, 4000);
    }

    async function fetchResult(repo, runId, token) {
        try {
            for(let i=0; i<6; i++) {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const art = data.artifacts.find(a => a.name === 'chatgpt-json');
                if(art) {
                    const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
                    const blob = await zipRes.blob();
                    const zip = await JSZip.loadAsync(blob);
                    const jsonStr = await zip.file("result.json").async("string");
                    const finalData = JSON.parse(jsonStr);
                    createMessage(finalData.response || finalData.message, 'bot');
                    resetUI();
                    return;
                }
                await new Promise(r => setTimeout(r, 3000));
            }
        } catch (e) { resetUI(); }
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('promptInput').style.height = 'auto';
    }
</script>
</body>
</html>
