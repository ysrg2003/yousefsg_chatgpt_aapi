<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGPT Pro | Flexible Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f4f7fb; --card: #ffffff; --text: #2d3436; --primary: #0984e3;
            --secondary: #dfe6e9; --user-bubble: #00b894; --bot-bubble: #ffffff;
            --border: #dcdde1; --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --code-bg: #1e1e1e;
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #38bdf8;
            --secondary: #334155; --user-bubble: #0f766e; --bot-bubble: #1e293b;
            --border: #334155; --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; overflow: hidden;
        }

        /* --- Header --- */
        header {
            flex-shrink: 0; padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card); border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .logo-text { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
        .nav-tools { display: flex; gap: 8px; }
        .tool-btn {
            background: var(--secondary); border: none; color: var(--text);
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- Chat Viewport --- */
        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 20px 10%; 
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg-container { display: flex; flex-direction: column; max-width: 90%; animation: fadeIn 0.3s ease; }
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; width: 100%; align-items: flex-end; }

        .bubble {
            padding: 15px 20px; border-radius: 18px; font-size: 15px; line-height: 1.7;
            box-shadow: var(--shadow); position: relative;
        }

        .user-align .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .bot-align .bubble { 
            background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px;
            width: fit-content; max-width: 98%;
        }

        /* --- تنظيف محتوى ChatGPT (هام جداً) --- */
        /* إخفاء الأزرار، الأيقونات، والنصوص المخفية التي تأتي في الـ HTML الأصلي */
        .bubble button, 
        .bubble svg, 
        .bubble .sr-only,
        .bubble [class*="copy"] { 
            display: none !important; 
        }

        /* --- تحسين الجداول --- */
        .bubble table {
            border-collapse: collapse; width: 100%; margin: 15px 0;
            border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
        }
        .bubble th { background: var(--secondary); padding: 12px; text-align: right; font-weight: 600; }
        .bubble td { padding: 10px; border-bottom: 1px solid var(--border); background: var(--card); }

        /* --- تحسين صناديق الكود --- */
        .code-wrapper {
            margin: 15px 0; border-radius: 10px; overflow: hidden;
            background: var(--code-bg); direction: ltr; text-align: left;
        }
        .code-header {
            background: #2d2d2d; color: #a29bfe; padding: 6px 15px; font-size: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #3d3d3d; font-family: monospace;
        }
        .copy-btn-custom {
            display: block !important; background: #444; color: #fff; border: none;
            padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;
        }
        .bubble pre { margin: 0; padding: 15px; overflow-x: auto; color: #d4d4d4; font-family: 'Consolas', monospace; }

        /* --- Footer --- */
        .footer-area { padding: 15px; background: var(--card); border-top: 1px solid var(--border); }
        .input-container {
            max-width: 800px; margin: 0 auto; background: var(--bg);
            border: 2px solid var(--border); border-radius: 25px;
            display: flex; align-items: center; padding: 5px 15px;
        }
        textarea { flex: 1; background: transparent; border: none; color: var(--text); padding: 10px; outline: none; resize: none; max-height: 150px; }
        .send-btn { background: var(--primary); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #status-bar { font-size: 12px; text-align: center; margin-bottom: 8px; color: var(--primary); display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo-text">🤖 ChatGPT Pro <small>Flex</small></div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="clearChat()">🗑️</button>
        <button class="tool-btn" onclick="toggleSettings()">⚙️</button>
        <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div id="settings-panel" style="display:none; padding:15px; background:var(--card); border-bottom:1px solid var(--border); gap:10px; grid-template-columns: 1fr 1fr;">
    <input type="password" id="ghToken" placeholder="GitHub Token" style="padding:8px; border-radius:5px; border:1px solid var(--border);">
    <input type="text" id="ghRepo" placeholder="username/repo" style="padding:8px; border-radius:5px; border:1px solid var(--border);">
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">مرحباً! تم تحديث النظام لتنظيف الأكواد وتحسين الجداول. كيف يمكنني مساعدتك؟</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar">⏳ جاري المعالجة...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اكتب سؤالك هنا..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
        applyTheme(localStorage.getItem('cfg_theme') || 'light');
    };

    function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        localStorage.setItem('cfg_theme', theme);
    }

    function toggleTheme() {
        applyTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function clearChat() {
        if(confirm("مسح المحادثة؟")) document.getElementById('chat-viewport').innerHTML = '';
    }

    function createMessage(content, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (side === 'bot') {
            bubble.innerHTML = content;
            formatContent(bubble); // استدعاء دالة التنظيف والتنسيق
        } else {
            bubble.innerText = content;
        }
        
        container.appendChild(bubble);
        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    // --- دالة التنسيق الذكية ---
    function formatContent(container) {
        // 1. معالجة الأكواد (Pre)
        container.querySelectorAll('pre').forEach(pre => {
            // محاولة معرفة اللغة من الكلاسات الأصلية
            let lang = "Code";
            const codeTag = pre.querySelector('code');
            if(codeTag) {
                const langClass = Array.from(codeTag.classList).find(c => c.startsWith('language-'));
                if(langClass) lang = langClass.replace('language-', '').toUpperCase();
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            wrapper.innerHTML = `
                <div class="code-header">
                    <span>${lang}</span>
                    <button class="copy-btn-custom" onclick="copyCode(this)">نسخ</button>
                </div>
            `;
            
            // قبل نقل الـ pre، نحذف أي نصوص "Python" أو أزرار "Copy" الأصلية التي قد تكون داخله
            // نركز فقط على محتوى الكود
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
        });

        // 2. معالجة الجداول (دعم التمرير على الموبايل)
        container.querySelectorAll('table').forEach(table => {
            const wrap = document.createElement('div');
            wrap.style.overflowX = 'auto';
            table.parentNode.insertBefore(wrap, table);
            wrap.appendChild(table);
        });
    }

    async function copyCode(btn) {
        const code = btn.closest('.code-wrapper').querySelector('pre').innerText;
        await navigator.clipboard.writeText(code);
        btn.innerText = "✅ تم";
        setTimeout(() => btn.innerText = "نسخ", 2000);
    }

    async function startProcess() {
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();

        if(!token || !repo || !prompt) return alert("أكمل البيانات أولاً");

        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const startTime = new Date().toISOString();
            await fetch(`https://api.github.com/repos/${repo}/actions/workflows/chatgpt_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });
            pollStatus(repo, token, startTime);
        } catch (e) {
            createMessage("❌ خطأ: " + e.message, 'bot');
            resetUI();
        }
    }

    async function pollStatus(repo, token, startTime) {
        let attempts = 0;
        const interval = setInterval(async () => {
            attempts++;
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?created=>${startTime}&per_page=1`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const run = data.workflow_runs[0];

            if(run && run.status === "completed") {
                clearInterval(interval);
                fetchResult(repo, run.id, token);
            } else if (attempts > 50) { clearInterval(interval); resetUI(); }
        }, 4000);
    }

    async function fetchResult(repo, runId, token) {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const art = data.artifacts.find(a => a.name === 'chatgpt-json');
            
            const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
            const blob = await zipRes.blob();
            const zip = await JSZip.loadAsync(blob);
            const jsonStr = await zip.file("result.json").async("string");
            const finalData = JSON.parse(jsonStr);
            createMessage(finalData.response || finalData.message, 'bot');
        } catch (e) { createMessage("❌ خطأ في النتيجة", 'bot'); }
        resetUI();
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('promptInput').style.height = 'auto';
    }
</script>
</body>
</html>
