<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>chatgpt AAPI Pro | الترسانة الكاملة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --text: #1f1f1f; --primary: #1a73e8;
            --secondary: #f1f3f4; --user-bubble: #e8f0fe; --bot-bubble: #ffffff;
            --border: #dee2e6; --accent: linear-gradient(135deg, #1a73e8, #701af0);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --code-bg: #1e1e1e; --code-text: #d4d4d4;
            --code-header: #2d2d2d;
        }

        [data-theme="dark"] {
            --bg: #131314; --card: #1e1f20; --text: #e3e3e3; --primary: #8ab4f8;
            --secondary: #2d2f31; --user-bubble: #004a77; --bot-bubble: #1e1f20;
            --border: #444746; --shadow: 0 4px 25px rgba(0,0,0,0.3);
            --code-bg: #000000; --code-text: #e3e3e3;
            --code-header: #1a1a1a;
        }

        * { box-sizing: border-box; transition: background 0.25s, color 0.25s; }

        /* 1. منطق مربع إدخال الأوامر (الاستقرار وعدم التغطية) */
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh;
            height: 100dvh; /* مهم للجوال */
            overflow: hidden; /* السكرول داخل الشات فقط */
        }

        header {
            flex-shrink: 0; padding: 12px 24px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card); border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow); z-index: 1000;
        }

        .logo { font-size: 1.4rem; font-weight: 600; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-tools { display: flex; gap: 12px; }
        .tool-btn {
            background: var(--secondary); border: none; color: var(--text);
            width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        #settings-panel {
            background: var(--card); padding: 20px; border-bottom: 1px solid var(--border);
            display: none; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px; flex-shrink: 0;
        }

        .input-field { display: flex; flex-direction: column; gap: 5px; }
        .input-field label { font-size: 12px; font-weight: bold; opacity: 0.8; }
        .input-field input { padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--secondary); color: var(--text); }

        #chat-viewport {
            flex: 1; /* يأخذ المساحة المتاحة ويجبر الفوتر على البقاء بالأسفل */
            overflow-y: auto;
            padding: 20px 10%; 
            display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;
        }

        .msg-container { display: flex; flex-direction: column; max-width: 100%; animation: fadeIn 0.3s ease; }
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; width: 100%; align-items: flex-end; }

        .bubble {
            padding: 16px 22px; border-radius: 20px; font-size: 15.5px; line-height: 1.7;
            word-wrap: break-word; overflow-wrap: break-word; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); max-width: 100%;
        }

        /* 2. CSS الجداول المطور */
        .bubble table {
            border-collapse: collapse; width: 100%; margin: 15px 0;
            background: var(--card); border-radius: 8px; overflow: hidden;
            display: block; overflow-x: auto; border: 1px solid var(--border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .bubble th {
            background: var(--primary); color: white !important;
            padding: 12px; text-align: right; font-weight: 600; white-space: nowrap;
        }

        .bubble td {
            border: 1px solid var(--border); padding: 10px;
            text-align: right; min-width: 100px; color: var(--text);
        }

        .bubble tr:nth-child(even) { background-color: rgba(0,0,0,0.03); }

        .bubble button:not(.copy-btn-snippet) { display: none !important; }
        .user-align .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .bot-align .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; max-width: 92%; }

        /* حاوية الكود */
        .code-wrapper {
            margin: 15px 0; border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border); background: var(--code-bg);
            direction: ltr; text-align: left;
        }

        .code-header-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; background: var(--code-header);
            color: #00cf7f; font-size: 11px; font-family: monospace;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .copy-btn-snippet {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 11px;
        }

        .bubble pre { 
            margin: 0 !important; padding: 15px; overflow-x: auto;
            color: var(--code-text); font-family: 'Consolas', monospace;
            font-size: 14px; background: transparent !important;
        }

        .footer-area {
            flex-shrink: 0; /* منع تقلص منطقة الإدخال */
            padding: 15px; background: var(--card); 
            border-top: 1px solid var(--border); width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .input-container {
            width: 100%; max-width: 800px; background: var(--secondary);
            border: 1px solid var(--border); border-radius: 24px;
            display: flex; align-items: center; padding: 4px 12px;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: var(--text);
            padding: 10px; font-size: 15px; resize: none; outline: none;
            max-height: 150px; min-height: 24px; font-family: inherit;
        }

        .send-btn {
            background: var(--primary); color: white; border: none;
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* تحسين بصري لتعطيل الزر */
        .send-btn:disabled {
            background: #ccc !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #status-bar { font-size: 12px; margin-bottom: 8px; color: var(--primary); font-weight: 700; display: none; }
        .loader { width: 12px; height: 12px; border: 2px solid var(--primary); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-left: 8px; }

        .msg-actions { margin-top: 8px; font-size: 12px; display: flex; gap: 15px; opacity: 0.7; }
        .action-link { cursor: pointer; color: var(--primary); }

        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            #chat-viewport { padding: 20px 5%; }
            .bot-align .bubble { max-width: 95%; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo">Chatgpt AAPI Pro</div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="toggleSettings()">⚙️</button>
        <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div id="settings-panel">
    <div class="input-field">
        <label>GitHub Token</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
    </div>
    <div class="input-field">
        <label>المستودع (User/Repo)</label>
        <input type="text" id="ghRepo" placeholder="username/repository">
    </div>
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">مرحباً! تم دمج منطق الاستقرار، تنسيق الجداول، وإصلاح زر الإرسال.</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar"><span class="loader"></span> جاري المعالجة...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اكتب سؤالك هنا..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
        const theme = localStorage.getItem('cfg_theme') || 'light';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
    };

    function toggleTheme() {
        const next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('cfg_theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = (p.style.display === 'grid' || p.style.display === 'flex') ? 'none' : 'grid';
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function createMessage(text, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (side === 'bot') {
            bubble.innerHTML = text; // السماح بـ HTML للجداول والأكواد

            const preBlocks = bubble.querySelectorAll('pre');
            preBlocks.forEach(pre => {
                if (pre.parentElement.classList.contains('code-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-wrapper';
                
                let langName = 'code';
                const codeInside = pre.querySelector('code');
                if(codeInside) {
                    const classes = Array.from(codeInside.classList);
                    const langClass = classes.find(c => c.startsWith('language-'));
                    if(langClass) langName = langClass.replace('language-', '');
                }

                const header = document.createElement('div');
                header.className = 'code-header-bar';
                header.innerHTML = `<span>${langName}</span><button class="copy-btn-snippet" onclick="copySnippet(this)">نسخ</button>`;
                
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);
            });
        } else {
            bubble.innerText = text;
        }
        
        container.appendChild(bubble);

        if(side === 'bot') {
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            actions.innerHTML = `<span class="action-link" onclick="copyFullResponse(this)">📋 نسخ الرد</span>`;
            container.appendChild(actions);
        }

        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    async function copySnippet(btn) {
        const codeElement = btn.parentElement.nextElementSibling.querySelector('code') || btn.parentElement.nextElementSibling;
        await navigator.clipboard.writeText(codeElement.innerText);
        btn.innerText = "✅ تم";
        setTimeout(() => btn.innerText = "نسخ", 2000);
    }

    async function copyFullResponse(el) {
        const text = el.parentElement.previousElementSibling.innerText;
        await navigator.clipboard.writeText(text);
        el.innerText = "✅ تم النسخ";
        setTimeout(() => el.innerText = "📋 نسخ الرد", 2000);
    }

    async function startProcess() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const prompt = document.getElementById('promptInput').value.trim();

        if(!token || !repo || !prompt) return alert("تأكد من إعداد التوكن والمستودع!");

        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('promptInput').style.height = 'auto';
        
        // تعطيل الزر فوراً
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/chatgpt_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });

            if(!res.ok) throw new Error("خطأ في الاتصال بـ GitHub.");
            checkStatus(repo, token);
        } catch (e) {
            createMessage("❌ خطأ: " + e.message, 'bot');
            resetUI();
        }
    }

    async function checkStatus(repo, token) {
        const startTime = Date.now();
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?per_page=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const run = data.workflow_runs[0];

                if(run && run.status === "completed") {
                    clearInterval(interval);
                    if(run.conclusion === "success") fetchArtifact(repo, run.id, token);
                    else { createMessage("❌ فشل الأكشن في التنفيذ.", 'bot'); resetUI(); }
                }
            } catch (e) { console.error(e); }
            if(Date.now() - startTime > 240000) { clearInterval(interval); resetUI(); }
        }, 5000);
    }

    async function fetchArtifact(repo, runId, token) {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const art = data.artifacts.find(a => a.name === 'chatgpt-json');
            if (!art) throw new Error("لم يتم العثور على النتائج.");

            const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
            const blob = await zipRes.blob();
            const zip = await JSZip.loadAsync(blob);
            const jsonStr = await zip.file("result.json").async("string");
            
            createMessage(JSON.parse(jsonStr).response, 'bot');
        } catch (e) {
            createMessage("❌ فشل استلام النتيجة: " + e.message, 'bot');
        } finally { resetUI(); } // يضمن تفعيل الزر مجدداً
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
    }
</script>
</body>
</html>
