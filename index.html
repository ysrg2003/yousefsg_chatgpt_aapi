<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGPT Pro | النسخة الاحترافية المحدثة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f4f7fb; --card: #ffffff; --text: #2d3436; --primary: #0984e3;
            --secondary: #dfe6e9; --user-bubble: #00b894; --bot-bubble: #ffffff;
            --border: #dcdde1; --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --code-bg: #1e1e1e; --code-header: #333;
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #38bdf8;
            --secondary: #334155; --user-bubble: #0f766e; --bot-bubble: #1e293b;
            --border: #334155; --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; overflow: hidden;
        }

        header {
            flex-shrink: 0; padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card); border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow); z-index: 10;
        }

        .logo-text { font-size: 1.2rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .nav-tools { display: flex; gap: 8px; }
        .tool-btn {
            background: var(--secondary); border: none; color: var(--text);
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        #settings-panel {
            background: var(--card); padding: 20px; border-bottom: 1px solid var(--border);
            display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
        }

        .input-field input { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid var(--border); background: var(--bg); color: var(--text); 
        }

        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 30px 10%; 
            display: flex; flex-direction: column; gap: 25px;
        }

        .msg-container { display: flex; flex-direction: column; max-width: 90%; animation: slideIn 0.3s ease; }
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; width: 100%; align-items: flex-end; }

        .bubble {
            padding: 18px 24px; border-radius: 22px; font-size: 15.5px; line-height: 1.8;
            position: relative; box-shadow: var(--shadow); word-wrap: break-word;
        }

        .user-align .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .bot-align .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; width: fit-content; max-width: 95%; }

        /* تجميل القوائم والجداول داخل الفقاعات */
        .bubble ul, .bubble ol { padding-right: 25px; }
        .bubble table { border-collapse: collapse; width: 100%; margin: 15px 0; font-size: 14px; }
        .bubble th, .bubble td { border: 1px solid var(--border); padding: 10px; text-align: center; }

        /* تصميم حاوية الكود المطور */
        .code-wrapper {
            margin: 15px 0; border-radius: 12px; overflow: hidden;
            background: var(--code-bg); direction: ltr; text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .code-header {
            background: var(--code-header); color: #eee; padding: 10px 15px;
            font-size: 12px; display: flex; justify-content: space-between; align-items: center;
            font-family: monospace; text-transform: uppercase;
        }
        .code-header span { color: #00b894; font-weight: bold; }
        .copy-code-btn {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px;
        }
        .copy-code-btn:hover { background: rgba(255,255,255,0.2); }
        .bubble pre { margin: 0; padding: 15px; overflow-x: auto; color: #d4d4d4; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.5; }

        .footer-area {
            padding: 20px; background: var(--card); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
        }

        .input-container {
            width: 100%; max-width: 850px; background: var(--bg);
            border: 2px solid var(--border); border-radius: 30px;
            display: flex; align-items: center; padding: 5px 15px;
        }

        textarea { flex: 1; background: transparent; border: none; color: var(--text); padding: 12px; font-size: 15px; outline: none; resize: none; max-height: 150px; }

        .send-btn { background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { opacity: 0.5; }

        #status-bar { font-size: 12px; margin-bottom: 10px; color: var(--primary); font-weight: 700; display: none; }
        .pulse { animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { #chat-viewport { padding: 20px 5%; } .msg-container { max-width: 95%; } }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo-text"><span>🤖</span> ChatGPT API Pro</div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="clearChat()">🗑️</button>
        <button class="tool-btn" onclick="toggleSettings()">⚙️</button>
        <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div id="settings-panel">
    <div class="input-field"><input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)"></div>
    <div class="input-field"><input type="text" id="ghRepo" placeholder="المستودع (username/repo)"></div>
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">أهلاً بك! تم تحديث نظام معالجة الأكواد لتكون أكثر نظافة ووضوحاً. جرب سؤالي عن أي كود برمجى.</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar" class="pulse">⏳ جاري انتظار الرد من الخادم...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اكتب سؤالك هنا..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
        const theme = localStorage.getItem('cfg_theme') || 'light';
        applyTheme(theme);
    };

    function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        localStorage.setItem('cfg_theme', theme);
    }

    function toggleTheme() {
        applyTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function clearChat() { if(confirm("مسح كل الرسائل؟")) document.getElementById('chat-viewport').innerHTML = ''; }

    function createMessage(content, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (side === 'bot') {
            bubble.innerHTML = content;
            formatContent(bubble);
        } else {
            bubble.innerText = content;
        }
        
        container.appendChild(bubble);
        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    // --- الوظيفة الجوهرية: تنظيف وتنسيق الأكواد ---
    function formatContent(container) {
        container.querySelectorAll('pre').forEach(pre => {
            // 1. استخراج اللغة من الكلاس (مثل language-python)
            const codeElem = pre.querySelector('code');
            let lang = "CODE";
            if (codeElem) {
                const langClass = Array.from(codeElem.classList).find(c => c.startsWith('language-'));
                if (langClass) lang = langClass.replace('language-', '').toUpperCase();
            }

            // 2. تنظيف النص: نأخذ innerText لضمان الحصول على الكود فقط بدون أزرار ChatGPT الزائدة
            const pureCode = codeElem ? codeElem.innerText : pre.innerText;

            // 3. بناء الهيكل الجديد النظيف تماماً
            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            wrapper.innerHTML = `
                <div class="code-header">
                    <span>${lang}</span>
                    <button class="copy-code-btn" onclick="copyCode(this)">نسخ الكود</button>
                </div>
                <pre><code>${escapeHtml(pureCode.trim())}</code></pre>
            `;

            // 4. استبدال القديم بالجديد
            pre.parentNode.replaceChild(wrapper, pre);
        });

        // حذف أي أزرار يتيمة قد تأتي من سكرابينج ChatGPT
        container.querySelectorAll('button').forEach(btn => { if(!btn.classList.contains('copy-code-btn')) btn.remove(); });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function copyCode(btn) {
        const code = btn.closest('.code-wrapper').querySelector('code').innerText;
        await navigator.clipboard.writeText(code);
        const old = btn.innerText;
        btn.innerText = "✅ تم النسخ";
        setTimeout(() => btn.innerText = old, 2000);
    }

    async function startProcess() {
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();

        if(!token || !repo || !prompt) return alert("أكمل البيانات أولاً!");

        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const startTime = new Date().toISOString();
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/chatgpt_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });
            if(!res.ok) throw new Error("فشل الاتصال بـ GitHub.");
            pollStatus(repo, token, startTime);
        } catch (e) {
            createMessage("❌ خطأ: " + e.message, 'bot');
            resetUI();
        }
    }

    async function pollStatus(repo, token, startTime) {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?created=>${startTime}&per_page=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const run = data.workflow_runs[0];
                if(run && run.status === "completed") {
                    clearInterval(interval);
                    fetchResult(repo, run.id, token);
                }
            } catch (e) { console.error(e); }
        }, 4000);
    }

    async function fetchResult(repo, runId, token) {
        try {
            // محاولات متكررة لجلب الـ Artifact
            for(let i=0; i<6; i++) {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const art = data.artifacts.find(a => a.name === 'chatgpt-json');
                if(art) {
                    const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
                    const blob = await zipRes.blob();
                    const zip = await JSZip.loadAsync(blob);
                    const jsonStr = await zip.file("result.json").async("string");
                    createMessage(JSON.parse(jsonStr).response, 'bot');
                    resetUI();
                    return;
                }
                await new Promise(r => setTimeout(r, 3000));
            }
            throw new Error("تأخر ظهور الملف.");
        } catch (e) { createMessage("❌ فشل سحب النتيجة: " + e.message, 'bot'); resetUI(); }
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('promptInput').style.height = 'auto';
    }
</script>
</body>
</html>
