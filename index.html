<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatgpt AAPI Pro | Flexible Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f4f7fb; --card: #ffffff; --text: #2d3436; --primary: #0984e3;
            --secondary: #dfe6e9; --user-bubble: #00b894; --bot-bubble: #ffffff;
            --border: #dcdde1; --accent: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --code-bg: #2d3436; --code-text: #fab1a0;
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #38bdf8;
            --secondary: #334155; --user-bubble: #0f766e; --bot-bubble: #1e293b;
            --border: #334155; --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --code-bg: #000000; --code-text: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; overflow: hidden;
        }

        /* Header */
        header {
            flex-shrink: 0; padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card); border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow); z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-text { font-size: 1.2rem; font-weight: 700; color: var(--primary); }

        .nav-tools { display: flex; gap: 8px; }
        .tool-btn {
            background: var(--secondary); border: none; color: var(--text);
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .tool-btn:hover { transform: translateY(-2px); filter: brightness(0.9); }

        /* Settings */
        #settings-panel {
            background: var(--card); padding: 20px; border-bottom: 1px solid var(--border);
            display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .input-field input { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid var(--border); background: var(--bg); color: var(--text); 
        }

        /* Chat Viewport */
        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 30px 15%; 
            display: flex; flex-direction: column; gap: 25px;
        }

        .msg-container { display: flex; flex-direction: column; max-width: 85%; animation: slideIn 0.4s ease-out; }
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; width: 100%; align-items: flex-end; }

        .bubble {
            padding: 18px 24px; border-radius: 22px; font-size: 15px; line-height: 1.8;
            position: relative; box-shadow: var(--shadow);
        }

        .user-align .bubble { 
            background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }
        .bot-align .bubble { 
            background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px;
            width: fit-content; max-width: 95%;
        }

        /* Markdown Styles Inside Bubble */
        .bubble ul, .bubble ol { padding-right: 20px; margin: 10px 0; }

        /* تحسين شكل الجداول */
        .bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
            background: var(--bg);
            border-radius: 8px;
            overflow: hidden; /* لمنع بروز الحواف */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: block; /* لجعل الجدول قابلاً للتمرير على الموبايل */
            overflow-x: auto;
        }

        .bubble th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: right;
            font-weight: 600;
        }

        .bubble td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: right;
            min-width: 100px;
        }

        .bubble tr:nth-child(even) {
            background-color: rgba(0,0,0,0.02);
        }

        /* Code Blocks */
        .code-wrapper {
            margin: 15px 0; border-radius: 12px; overflow: hidden;
            background: #1e1e1e; direction: ltr; text-align: left;
        }
        .code-header {
            background: #333; color: #eee; padding: 8px 15px; font-size: 11px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .bubble pre { margin: 0; padding: 15px; overflow-x: auto; color: #d4d4d4; font-family: 'Consolas', monospace; }

        /* Footer */
        .footer-area {
            padding: 20px; background: var(--card); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
        }

        .input-container {
            width: 100%; max-width: 850px; background: var(--bg);
            border: 2px solid var(--border); border-radius: 30px;
            display: flex; align-items: center; padding: 5px 15px;
        }
        .input-container:focus-within { border-color: var(--primary); }

        textarea { 
            flex: 1; background: transparent; border: none; color: var(--text); 
            padding: 12px; font-size: 15px; outline: none; resize: none; max-height: 150px;
        }

        .send-btn { 
            background: var(--primary); color: white; border: none; 
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        /* Status & Loaders */
        #status-bar { font-size: 13px; margin-bottom: 10px; color: var(--primary); font-weight: 600; display: none; }
        .pulse { animation: pulse-animation 1.5s infinite; }

        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            #chat-viewport { padding: 20px 5%; }
            .msg-container { max-width: 95%; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo-area">
        <span style="font-size: 24px;">🤖</span>
        <div class="logo-text">ChatGPT Pro <small style="font-weight: 300; font-size: 10px;">Flex</small></div>
    </div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="clearChat()" title="مسح المحادثة">🗑️</button>
        <button class="tool-btn" onclick="toggleSettings()" title="الإعدادات">⚙️</button>
        <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div id="settings-panel">
    <div class="input-field">
        <input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)">
    </div>
    <div class="input-field">
        <input type="text" id="ghRepo" placeholder="المستودع (username/repo)">
    </div>
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">أهلاً بك! النسخة المرنة جاهزة. كيف يمكنني مساعدتك اليوم؟</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar" class="pulse">⏳ جاري معالجة الطلب...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اكتب سؤالك هنا..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    // تهيئة البيانات عند التحميل
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
        applyTheme(localStorage.getItem('cfg_theme') || 'light');
    };

    function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        localStorage.setItem('cfg_theme', theme);
    }

    function toggleTheme() {
        applyTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function clearChat() {
        if(confirm("هل تريد مسح المحادثة؟")) {
            document.getElementById('chat-viewport').innerHTML = '';
        }
    }

    function createMessage(content, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (side === 'bot') {
            // إذا المحتوى HTML (مثل رد يحتوي على <pre>، جداول...) نضعه كـ innerHTML
            bubble.innerHTML = content;
            formatContent(bubble);
        } else {
            bubble.innerText = content;
        }
        
        container.appendChild(bubble);
        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    // ===========================
    // تنسيق الأكواد والمحتوى — محدث كما طلبت
    //  - يحذف أزرار الـ scraping
    //  - يحذف أي عناصر تسميات لغات شائعة
    //  - يحذف السطر الأول داخل كل <pre> دائماً
    //  - يضيف غلاف واحد موحد وزر نسخ واحد فقط
    // ===========================
    function formatContent(container) {
        // 1) إزالة أي أزرار أو عناصر دور button جاءت من الـ scraping
        container.querySelectorAll('button, [role="button"], .copy-button, .btn-copy, .copy-btn, .clipboard-btn').forEach(el => el.remove());

        // 2) إزالة أي عناصر تسميات اللغة الشائعة
        container.querySelectorAll('.lang, .language-label, .highlight-lang, .code-lang, .language').forEach(el => el.remove());

        // 3) تنظيف أي عناصر صغيرة تشير إلى "نسخ" أو "copy" (نصوص/spans)
        container.querySelectorAll('span, div').forEach(el => {
            const t = (el.innerText || '').trim().toLowerCase();
            if (t === 'copy' || t === 'نسخ' || t === 'copy code' || t === 'copy to clipboard') {
                el.remove();
            }
        });

        // 4) معالجة كل <pre> داخل الحاوية
        container.querySelectorAll('pre').forEach(pre => {
            try {
                // استخدام innerText للحصول على تمثيل نصي نظيف
                const rawText = pre.innerText.replace(/\r/g, '');
                const lines = rawText.split('\n');

                // حذف السطر الأول دائماً كما طلبت
                if (lines.length > 0) lines.shift();

                // إعادة المحتوى كنص خام (لا HTML)
                pre.textContent = lines.join('\n');

                // إنشاء الغلاف (إذا لم يكن موجوداً بالفعل)
                const wrapper = document.createElement('div');
                wrapper.className = 'code-wrapper';
                wrapper.style.direction = 'ltr';

                const header = document.createElement('div');
                header.className = 'code-header';

                const titleSpan = document.createElement('span');
                titleSpan.textContent = 'Code';

                const copyBtn = document.createElement('button');
                copyBtn.style.cursor = 'pointer';
                copyBtn.style.background = 'none';
                copyBtn.style.border = 'none';
                copyBtn.style.color = '#fff';
                copyBtn.style.fontSize = '11px';
                copyBtn.textContent = 'نسخ';
                copyBtn.addEventListener('click', () => copyCode(copyBtn));

                header.appendChild(titleSpan);
                header.appendChild(copyBtn);

                // استبدال pre بالغلاف الذي يحتوي الهيدر و ال pre بداخله
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);

            } catch (err) {
                console.error('formatContent error:', err);
            }
        });

        // تنظيف جداول أو عناصر عرض كبيرة (اختياري: نحافظ على الجداول لكن نزيل أزرارها)
        container.querySelectorAll('table').forEach(tbl => {
            tbl.querySelectorAll('button, [role="button"], .copy-button').forEach(x => x.remove());
        });
    }

    // زر النسخ الموحد لدينا
    async function copyCode(btn) {
        try {
            const wrapper = btn.closest('.code-wrapper');
            if (!wrapper) return;
            const pre = wrapper.querySelector('pre');
            if (!pre) return;
            const code = pre.innerText;
            await navigator.clipboard.writeText(code);
            const old = btn.innerText;
            btn.innerText = "✅ تم!";
            setTimeout(() => btn.innerText = old, 1600);
        } catch (e) {
            console.error('نسخ فشل:', e);
            btn.innerText = "خطأ";
            setTimeout(() => btn.innerText = "نسخ", 1600);
        }
    }

    // ===========================
    // من هنا فصاعداً يبقى منطق إرسال الطلب إلى GitHub وتجهيز النتيجة كما كان
    // ===========================
    async function startProcess() {
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();

        if(!token || !repo || !prompt) return alert("يرجى التأكد من التوكن والمستودع وكتابة سؤال.");

        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const startTime = new Date().toISOString();
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/chatgpt_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });

            if(!res.ok) throw new Error("التوكن غير صحيح أو المستودع غير موجود.");

            pollStatus(repo, token, startTime);
        } catch (e) {
            createMessage("❌ فشل الطلب: " + e.message, 'bot');
            resetUI();
        }
    }

    async function pollStatus(repo, token, startTime) {
        let attempts = 0;
        const interval = setInterval(async () => {
            attempts++;
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?created=>${startTime}&per_page=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const run = data.workflow_runs ? data.workflow_runs[0] : null;

                if(run && run.status === "completed") {
                    clearInterval(interval);
                    fetchResult(repo, run.id, token);
                } else if (attempts > 60) { // توقف بعد ~4 دقائق
                    clearInterval(interval);
                    createMessage("⚠️ انتهى وقت الانتظار. يرجى التحقق من GitHub Actions يدويًا.", 'bot');
                    resetUI();
                }
            } catch (e) { console.error(e); }
        }, 4000);
    }

    async function fetchResult(repo, runId, token) {
        try {
            // محاولة جلب الـ Artifact (بحد أقصى 5 محاولات لأن GitHub قد يتأخر)
            for(let i=0; i<5; i++) {
                const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const art = data.artifacts ? data.artifacts.find(a => a.name === 'chatgpt-json') : null;
                
                if(art) {
                    const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
                    const blob = await zipRes.blob();
                    const zip = await JSZip.loadAsync(blob);
                    const jsonStr = await zip.file("result.json").async("string");
                    const finalData = JSON.parse(jsonStr);
                    createMessage(finalData.response || finalData.message, 'bot');
                    resetUI();
                    return;
                }
                await new Promise(r => setTimeout(r, 3000));
            }
            throw new Error("لم يظهر ملف النتيجة بعد. حاول مرة أخرى.");
        } catch (e) {
            createMessage("❌ خطأ في جلب النتيجة: " + e.message, 'bot');
            resetUI();
        }
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('promptInput').style.height = 'auto';
    }
</script>
</body>
</html>
